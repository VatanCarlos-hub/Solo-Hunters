<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SOLO HUNTERS — Bitaxe Leaderboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=JetBrains+Mono:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a0a;
    --bg-card:#121212;
    --bg-card-hi:#1a1a1a;
    --orange:#f7931a;
    --orange-dim:#a05f0d;
    --red:#ef4444;
    --green:#22c55e;
    --text:#e5e5e5;
    --text-dim:#737373;
    --border:#262626;
    --gold:#fbbf24;
    --silver:#cbd5e1;
    --bronze:#b45309;
  }

  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;min-height:100vh}

  body{
    background-image:
      radial-gradient(circle at 20% 10%, rgba(247,147,26,0.08), transparent 40%),
      radial-gradient(circle at 80% 60%, rgba(247,147,26,0.05), transparent 50%),
      linear-gradient(180deg, #0a0a0a 0%, #050505 100%);
    background-attachment:fixed;
    padding-bottom:120px;
  }

  /* Subtle grain overlay */
  body::before{
    content:'';
    position:fixed;inset:0;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.4'/%3E%3C/svg%3E");
    opacity:0.04;
    pointer-events:none;
    z-index:1;
  }

  .wrap{max-width:720px;margin:0 auto;padding:24px 16px;position:relative;z-index:2}

  /* HEADER */
  .hero{
    text-align:center;
    padding:32px 0 24px;
    border-bottom:1px solid var(--border);
    margin-bottom:24px;
  }
  .logo{
    font-family:'UnifrakturMaguntia',serif;
    font-size:clamp(40px, 11vw, 64px);
    line-height:0.9;
    color:var(--orange);
    letter-spacing:2px;
    text-shadow:0 0 30px rgba(247,147,26,0.4);
    margin-bottom:8px;
    transform:translateX(2px);
  }
  .tagline{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:4px;
    color:var(--text-dim);
    font-weight:500;
  }
  .tagline span{color:var(--orange)}

  /* STATS BAR */
  .stats-bar{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:1px;
    background:var(--border);
    border:1px solid var(--border);
    margin-bottom:20px;
  }
  .stat{
    background:var(--bg-card);
    padding:12px 8px;
    text-align:center;
  }
  .stat-label{
    font-size:9px;
    text-transform:uppercase;
    letter-spacing:1.5px;
    color:var(--text-dim);
    margin-bottom:4px;
  }
  .stat-value{
    font-size:18px;
    font-weight:700;
    color:var(--orange);
  }

  /* ADD ADDRESS BAR */
  .add-section{
    background:var(--bg-card);
    border:1px solid var(--border);
    padding:16px;
    margin-bottom:20px;
    position:relative;
  }
  .add-section::before{
    content:'';
    position:absolute;
    top:-1px;left:-1px;
    width:30px;height:30px;
    border-top:2px solid var(--orange);
    border-left:2px solid var(--orange);
  }
  .add-section::after{
    content:'';
    position:absolute;
    bottom:-1px;right:-1px;
    width:30px;height:30px;
    border-bottom:2px solid var(--orange);
    border-right:2px solid var(--orange);
  }

  .add-title{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:3px;
    color:var(--orange);
    margin-bottom:12px;
    font-weight:700;
  }
  .add-row{display:flex;gap:8px;flex-wrap:wrap}
  .input{
    flex:1;
    min-width:200px;
    background:var(--bg);
    border:1px solid var(--border);
    color:var(--text);
    padding:12px;
    font-family:'JetBrains Mono',monospace;
    font-size:13px;
    outline:none;
    transition:border-color 0.2s;
  }
  .input:focus{border-color:var(--orange)}
  .input.nick{max-width:160px}

  .btn{
    background:var(--orange);
    color:#000;
    border:none;
    padding:12px 20px;
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:2px;
    cursor:pointer;
    transition:all 0.2s;
  }
  .btn:hover{background:#fff;transform:translateY(-1px)}
  .btn:disabled{opacity:0.4;cursor:not-allowed;transform:none}

  /* FILTERS */
  .filters{
    display:flex;
    gap:8px;
    margin-bottom:16px;
    overflow-x:auto;
    padding-bottom:4px;
  }
  .filter-btn{
    background:transparent;
    border:1px solid var(--border);
    color:var(--text-dim);
    padding:8px 14px;
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:1.5px;
    cursor:pointer;
    white-space:nowrap;
    transition:all 0.2s;
  }
  .filter-btn:hover{color:var(--text);border-color:var(--text-dim)}
  .filter-btn.active{
    background:var(--orange);
    color:#000;
    border-color:var(--orange);
    font-weight:700;
  }

  /* LEADERBOARD */
  .board{
    display:flex;
    flex-direction:column;
    gap:8px;
  }

  .row{
    background:var(--bg-card);
    border:1px solid var(--border);
    padding:14px;
    display:grid;
    grid-template-columns:auto 1fr auto;
    align-items:center;
    gap:12px;
    position:relative;
    transition:all 0.2s;
  }
  .row:hover{border-color:var(--orange-dim);background:var(--bg-card-hi)}
  .row.me{
    border-color:var(--orange);
    background:linear-gradient(90deg, rgba(247,147,26,0.08), transparent);
  }
  .row.loading{opacity:0.5}
  .row.error{opacity:0.6;border-color:var(--red)}

  .rank{
    font-size:24px;
    font-weight:800;
    color:var(--text-dim);
    min-width:48px;
    text-align:center;
    font-variant-numeric:tabular-nums;
  }
  .row:nth-child(1) .rank{color:var(--gold);text-shadow:0 0 10px rgba(251,191,36,0.3)}
  .row:nth-child(2) .rank{color:var(--silver)}
  .row:nth-child(3) .rank{color:var(--bronze)}

  .info{min-width:0}
  .nick-row{
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom:4px;
    flex-wrap:wrap;
  }
  .nick{
    font-weight:700;
    font-size:15px;
    color:var(--text);
    letter-spacing:0.5px;
  }
  .me-badge{
    background:var(--orange);
    color:#000;
    font-size:9px;
    padding:2px 6px;
    font-weight:800;
    letter-spacing:1px;
  }
  .addr{
    font-size:11px;
    color:var(--text-dim);
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
    font-family:'JetBrains Mono',monospace;
  }

  .metrics{
    text-align:right;
    min-width:90px;
  }
  .primary{
    font-size:16px;
    font-weight:700;
    color:var(--orange);
    line-height:1.1;
    font-variant-numeric:tabular-nums;
  }
  .primary-label{
    font-size:9px;
    color:var(--text-dim);
    text-transform:uppercase;
    letter-spacing:1px;
    margin-top:2px;
  }
  .secondary{
    font-size:11px;
    color:var(--text-dim);
    margin-top:4px;
  }
  .secondary .live{color:var(--green)}
  .secondary .offline{color:var(--red)}

  .remove{
    position:absolute;
    top:6px;right:6px;
    background:transparent;
    border:none;
    color:var(--text-dim);
    cursor:pointer;
    font-size:14px;
    padding:2px 6px;
    opacity:0;
    transition:opacity 0.2s;
  }
  .row:hover .remove{opacity:1}
  .remove:hover{color:var(--red)}

  .empty{
    text-align:center;
    padding:48px 16px;
    color:var(--text-dim);
    border:1px dashed var(--border);
  }
  .empty-icon{font-size:32px;margin-bottom:8px;opacity:0.5}

  /* FOOTER */
  .footer{
    margin-top:32px;
    padding:20px 0;
    border-top:1px solid var(--border);
    text-align:center;
    font-size:10px;
    color:var(--text-dim);
    letter-spacing:1px;
  }
  .footer a{color:var(--orange);text-decoration:none}
  .footer .heart{color:var(--red)}

  /* PULSE LIVE INDICATOR */
  .pulse{
    display:inline-block;
    width:6px;height:6px;
    background:var(--green);
    border-radius:50%;
    margin-right:4px;
    animation:pulse 2s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(34,197,94,0.6)}
    50%{opacity:0.5;box-shadow:0 0 0 6px rgba(34,197,94,0)}
  }

  /* MOBILE */
  @media (max-width:480px){
    .add-row{flex-direction:column}
    .input,.btn{width:100%}
    .input.nick{max-width:none}
    .row{padding:12px 10px;gap:8px}
    .rank{font-size:20px;min-width:36px}
    .primary{font-size:14px}
    .nick{font-size:13px}
    .addr{font-size:10px}
  }

  /* LOADING SPINNER */
  .spinner{
    display:inline-block;
    width:12px;height:12px;
    border:2px solid var(--border);
    border-top-color:var(--orange);
    border-radius:50%;
    animation:spin 0.8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}

  /* INTRO ANIMATION */
  .hero,.stats-bar,.add-section,.filters,.board{
    opacity:0;
    animation:fadeUp 0.6s ease-out forwards;
  }
  .stats-bar{animation-delay:0.1s}
  .add-section{animation-delay:0.2s}
  .filters{animation-delay:0.3s}
  .board{animation-delay:0.4s}
  @keyframes fadeUp{
    from{opacity:0;transform:translateY(10px)}
    to{opacity:1;transform:translateY(0)}
  }
</style>
</head>
<body>

<div class="wrap">

  <header class="hero">
    <div class="logo">Solo Hunters</div>
    <div class="tagline">BITAXE <span>•</span> SOLO MINING <span>•</span> LEADERBOARD</div>
  </header>

  <div class="stats-bar">
    <div class="stat">
      <div class="stat-label">Hunters</div>
      <div class="stat-value" id="stat-count">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Total Hashrate</div>
      <div class="stat-value" id="stat-hashrate">0 TH/s</div>
    </div>
    <div class="stat">
      <div class="stat-label">Best Difficulty</div>
      <div class="stat-value" id="stat-best">0</div>
    </div>
  </div>

  <section class="add-section">
    <div class="add-title">+ Hunter hinzufügen</div>
    <div class="add-row">
      <input class="input nick" id="nick-input" type="text" placeholder="Nickname" maxlength="20">
      <input class="input" id="addr-input" type="text" placeholder="bc1q... BTC address" autocomplete="off" spellcheck="false">
      <button class="btn" id="add-btn">Track</button>
    </div>
  </section>

  <div class="filters">
    <button class="filter-btn active" data-sort="best">🏆 Best Difficulty</button>
    <button class="filter-btn" data-sort="hashrate">⚡ Hashrate</button>
    <button class="filter-btn" data-sort="boot">🔥 Since Boot</button>
  </div>

  <div class="board" id="board"></div>

  <footer class="footer">
    Built with <span class="heart">♥</span> by <a href="https://x.com/__KimMinJae__" target="_blank">@__KimMinJae__</a><br>
    Data: <a href="https://web.public-pool.io" target="_blank">public-pool.io</a> • Auto-refresh 60s
  </footer>

</div>

<script>
// =========================
// SOLO HUNTERS – Leaderboard
// =========================

const STORAGE_KEY = 'solo_hunters_v1';
const MY_ADDR = 'bc1qvv8t2mh2cgcrl6yxysrrrft0l5h3y8f444gknf';
const API_BASE = 'https://web.public-pool.io/api/client';
const REFRESH_INTERVAL = 60000;

// Seed list – your address + room for community
const SEED_DATA = [
  { nick: 'Vatan', addr: MY_ADDR, isMe: true }
];

let hunters = loadHunters();
let currentSort = 'best';
let liveData = {};

// ---------- STORAGE ----------
function loadHunters(){
  try{
    const saved = localStorage.getItem(STORAGE_KEY);
    if(saved){
      const parsed = JSON.parse(saved);
      if(Array.isArray(parsed) && parsed.length > 0) return parsed;
    }
  }catch(e){}
  return SEED_DATA;
}
function saveHunters(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(hunters)); }catch(e){}
}

// ---------- API ----------
async function fetchStats(addr){
  try{
    const res = await fetch(`${API_BASE}/${addr}`, { cache:'no-store' });
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    return { ok:true, data };
  }catch(err){
    return { ok:false, error: err.message };
  }
}

async function refreshAll(){
  const results = await Promise.all(
    hunters.map(async h => {
      const r = await fetchStats(h.addr);
      return { addr: h.addr, ...r };
    })
  );
  results.forEach(r => { liveData[r.addr] = r; });
  render();
}

// ---------- PARSE STATS ----------
function getStats(addr){
  const entry = liveData[addr];
  if(!entry) return { state:'loading' };
  if(!entry.ok) return { state:'error' };

  const d = entry.data || {};
  // Public-pool API fields (defensive parsing)
  const bestDiff = num(d.bestDifficulty);
  const bestSinceBoot = num(d.bestDifficultySinceReset);
  const workers = Array.isArray(d.workers) ? d.workers : [];
  const workerCount = d.workersCount || workers.length || 0;
  let hashrate = 0;
  workers.forEach(w => { hashrate += num(w.hashRate); });

  return {
    state: workerCount > 0 ? 'online' : 'offline',
    bestDiff,
    bestSinceBoot,
    hashrate, // in H/s typically; we'll format
    workerCount
  };
}

function num(v){
  if(v === null || v === undefined) return 0;
  if(typeof v === 'number') return v;
  const parsed = parseFloat(String(v).replace(/[, ]/g,''));
  return isNaN(parsed) ? 0 : parsed;
}

// ---------- FORMAT ----------
function fmtHash(hps){
  // hps could come as TH/s or H/s; assume H/s and convert
  if(!hps) return '—';
  // Heuristic: bitaxe hashrate from public-pool is reported in GH/s typically
  // We'll trust value as-is and pick the right unit
  let v = hps;
  let unit = 'H/s';
  // If number is very small (< 1000), assume already in GH/s
  if(v < 1000 && v > 0.001){
    return v >= 1000 ? `${(v/1000).toFixed(2)} TH/s` : `${v.toFixed(2)} GH/s`;
  }
  // Else treat as H/s and step up
  if(v >= 1e12){ unit='TH/s'; v=v/1e12 }
  else if(v >= 1e9){ unit='GH/s'; v=v/1e9 }
  else if(v >= 1e6){ unit='MH/s'; v=v/1e6 }
  else if(v >= 1e3){ unit='KH/s'; v=v/1e3 }
  return `${v.toFixed(2)} ${unit}`;
}

function fmtDiff(d){
  if(!d) return '—';
  if(d >= 1e12) return (d/1e12).toFixed(2) + ' T';
  if(d >= 1e9)  return (d/1e9).toFixed(2)  + ' B';
  if(d >= 1e6)  return (d/1e6).toFixed(2)  + ' M';
  if(d >= 1e3)  return (d/1e3).toFixed(2)  + ' K';
  return d.toFixed(0);
}

function shortAddr(a){
  if(!a) return '';
  if(a.length <= 14) return a;
  return a.slice(0,8) + '…' + a.slice(-6);
}

// ---------- RENDER ----------
function render(){
  const board = document.getElementById('board');

  // Build enriched list
  const enriched = hunters.map(h => ({ ...h, stats: getStats(h.addr) }));

  // Sort
  const sortKey = currentSort;
  enriched.sort((a,b)=>{
    const av = sortKey === 'hashrate' ? (a.stats.hashrate||0)
             : sortKey === 'boot'     ? (a.stats.bestSinceBoot||0)
             : (a.stats.bestDiff||0);
    const bv = sortKey === 'hashrate' ? (b.stats.hashrate||0)
             : sortKey === 'boot'     ? (b.stats.bestSinceBoot||0)
             : (b.stats.bestDiff||0);
    return bv - av;
  });

  // Update stats bar
  document.getElementById('stat-count').textContent = enriched.length;
  const totalHash = enriched.reduce((s,h)=>s + (h.stats.hashrate||0), 0);
  document.getElementById('stat-hashrate').textContent = fmtHash(totalHash);
  const topBest = enriched.reduce((m,h)=>Math.max(m, h.stats.bestDiff||0), 0);
  document.getElementById('stat-best').textContent = fmtDiff(topBest);

  // Render rows
  if(enriched.length === 0){
    board.innerHTML = `
      <div class="empty">
        <div class="empty-icon">⛏️</div>
        <div>Noch keine Hunter eingetragen.<br>Trag oben die erste BTC-Adresse ein.</div>
      </div>`;
    return;
  }

  board.innerHTML = enriched.map((h, i) => {
    const s = h.stats;
    const rank = i + 1;
    const meCls = h.isMe ? ' me' : '';
    const stateCls = s.state === 'loading' ? ' loading' : s.state === 'error' ? ' error' : '';

    let primaryVal, primaryLabel, secondary;
    if(s.state === 'loading'){
      primaryVal = '<span class="spinner"></span>';
      primaryLabel = 'lädt';
      secondary = '';
    } else if(s.state === 'error'){
      primaryVal = '—';
      primaryLabel = 'offline';
      secondary = '<span class="offline">Adresse nicht gefunden</span>';
    } else {
      if(currentSort === 'hashrate'){
        primaryVal = fmtHash(s.hashrate);
        primaryLabel = 'hashrate';
        secondary = `Best: ${fmtDiff(s.bestDiff)}`;
      } else if(currentSort === 'boot'){
        primaryVal = fmtDiff(s.bestSinceBoot);
        primaryLabel = 'since boot';
        secondary = `All-time: ${fmtDiff(s.bestDiff)}`;
      } else {
        primaryVal = fmtDiff(s.bestDiff);
        primaryLabel = 'all-time best';
        secondary = s.state === 'online'
          ? `<span class="live"><span class="pulse"></span>${fmtHash(s.hashrate)}</span>`
          : `<span class="offline">offline</span>`;
      }
    }

    return `
      <div class="row${meCls}${stateCls}">
        <div class="rank">${rank}</div>
        <div class="info">
          <div class="nick-row">
            <span class="nick">${escapeHtml(h.nick || 'Anonymous')}</span>
            ${h.isMe ? '<span class="me-badge">YOU</span>' : ''}
          </div>
          <div class="addr" title="${escapeHtml(h.addr)}">${shortAddr(h.addr)}</div>
        </div>
        <div class="metrics">
          <div class="primary">${primaryVal}</div>
          <div class="primary-label">${primaryLabel}</div>
          ${secondary ? `<div class="secondary">${secondary}</div>` : ''}
        </div>
        ${h.isMe ? '' : `<button class="remove" data-addr="${escapeHtml(h.addr)}" title="Entfernen">✕</button>`}
      </div>`;
  }).join('');

  // Hook remove buttons
  document.querySelectorAll('.remove').forEach(btn=>{
    btn.addEventListener('click', e=>{
      const a = btn.getAttribute('data-addr');
      hunters = hunters.filter(h => h.addr !== a);
      saveHunters();
      delete liveData[a];
      render();
    });
  });
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

// ---------- ADD ----------
function addHunter(){
  const nickEl = document.getElementById('nick-input');
  const addrEl = document.getElementById('addr-input');
  const nick = nickEl.value.trim() || 'Anonymous';
  const addr = addrEl.value.trim();

  if(!addr) { addrEl.focus(); return; }
  if(!/^(bc1|[13])[a-zA-HJ-NP-Z0-9]{20,}$/.test(addr)){
    alert('Keine gültige BTC-Adresse.');
    return;
  }
  if(hunters.find(h => h.addr === addr)){
    alert('Diese Adresse ist schon eingetragen.');
    return;
  }
  hunters.push({ nick, addr });
  saveHunters();
  nickEl.value = '';
  addrEl.value = '';
  render();
  // Fetch immediately
  fetchStats(addr).then(r => {
    liveData[addr] = { addr, ...r };
    render();
  });
}

// ---------- WIRE UP ----------
document.getElementById('add-btn').addEventListener('click', addHunter);
document.getElementById('addr-input').addEventListener('keydown', e => {
  if(e.key === 'Enter') addHunter();
});
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentSort = btn.getAttribute('data-sort');
    render();
  });
});

// Init
render();
refreshAll();
setInterval(refreshAll, REFRESH_INTERVAL);
</script>

</body>
</html>
