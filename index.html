<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SOLO HUNTERS — Bitaxe Leaderboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=JetBrains+Mono:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a0a;--bg-card:#121212;--bg-card-hi:#1a1a1a;
    --orange:#f7931a;--orange-dim:#a05f0d;
    --red:#ef4444;--green:#22c55e;
    --text:#e5e5e5;--text-dim:#737373;--border:#262626;
    --gold:#fbbf24;--silver:#cbd5e1;--bronze:#b45309;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;min-height:100vh}
  body{
    background-image:radial-gradient(circle at 20% 10%,rgba(247,147,26,0.08),transparent 40%),radial-gradient(circle at 80% 60%,rgba(247,147,26,0.05),transparent 50%),linear-gradient(180deg,#0a0a0a 0%,#050505 100%);
    background-attachment:fixed;padding-bottom:120px;
  }
  body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.4'/%3E%3C/svg%3E");opacity:0.04;pointer-events:none;z-index:1;}
  .wrap{max-width:720px;margin:0 auto;padding:24px 16px;position:relative;z-index:2}
  .hero{text-align:center;padding:32px 0 24px;border-bottom:1px solid var(--border);margin-bottom:24px;}
  .logo{font-family:'UnifrakturMaguntia',serif;font-size:clamp(40px,11vw,64px);line-height:0.9;color:var(--orange);letter-spacing:2px;text-shadow:0 0 30px rgba(247,147,26,0.4);margin-bottom:8px;}
  .tagline{font-size:11px;text-transform:uppercase;letter-spacing:4px;color:var(--text-dim);font-weight:500;}
  .tagline span{color:var(--orange)}
  .stats-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border:1px solid var(--border);margin-bottom:20px;}
  .stat{background:var(--bg-card);padding:12px 8px;text-align:center;}
  .stat-label{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-dim);margin-bottom:4px;}
  .stat-value{font-size:18px;font-weight:700;color:var(--orange);}
  .add-section{background:var(--bg-card);border:1px solid var(--border);padding:16px;margin-bottom:20px;position:relative;}
  .add-section::before{content:'';position:absolute;top:-1px;left:-1px;width:30px;height:30px;border-top:2px solid var(--orange);border-left:2px solid var(--orange);}
  .add-section::after{content:'';position:absolute;bottom:-1px;right:-1px;width:30px;height:30px;border-bottom:2px solid var(--orange);border-right:2px solid var(--orange);}
  .add-title{font-size:11px;text-transform:uppercase;letter-spacing:3px;color:var(--orange);margin-bottom:12px;font-weight:700;}
  .add-row{display:flex;gap:8px;flex-wrap:wrap}
  .input{flex:1;min-width:200px;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:12px;font-family:'JetBrains Mono',monospace;font-size:13px;outline:none;transition:border-color 0.2s;}
  .input:focus{border-color:var(--orange)}
  .input.nick{max-width:160px}
  .btn{background:var(--orange);color:#000;border:none;padding:12px 20px;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:2px;cursor:pointer;transition:all 0.2s;}
  .btn:hover{background:#fff;transform:translateY(-1px)}
  .filters{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px;}
  .filter-btn{background:transparent;border:1px solid var(--border);color:var(--text-dim);padding:8px 14px;font-family:'JetBrains Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:1.5px;cursor:pointer;white-space:nowrap;transition:all 0.2s;}
  .filter-btn:hover{color:var(--text);border-color:var(--text-dim)}
  .filter-btn.active{background:var(--orange);color:#000;border-color:var(--orange);font-weight:700;}
  .board{display:flex;flex-direction:column;gap:8px;}
  .row{background:var(--bg-card);border:1px solid var(--border);padding:14px;display:grid;grid-template-columns:auto 1fr auto;align-items:start;gap:12px;position:relative;transition:all 0.2s;}
  .row:hover{border-color:var(--orange-dim);background:var(--bg-card-hi)}
  .row.me{border-color:var(--orange);background:linear-gradient(90deg,rgba(247,147,26,0.08),transparent);}
  .row.loading{opacity:0.5}.row.error{opacity:0.6;border-color:var(--red)}
  .rank{font-size:24px;font-weight:800;color:var(--text-dim);min-width:48px;text-align:center;padding-top:2px;}
  .row:nth-child(1) .rank{color:var(--gold);text-shadow:0 0 10px rgba(251,191,36,0.3)}
  .row:nth-child(2) .rank{color:var(--silver)}
  .row:nth-child(3) .rank{color:var(--bronze)}
  .info{min-width:0}
  .nick-row{display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap;}
  .nick{font-weight:700;font-size:15px;color:var(--text);letter-spacing:0.5px;}
  .me-badge{background:var(--orange);color:#000;font-size:9px;padding:2px 6px;font-weight:800;letter-spacing:1px;}
  .addr{font-size:11px;color:var(--text-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .badges{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;}
  .badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;font-size:9px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;border:1px solid;line-height:1.6;cursor:default;position:relative;}
  .badge:hover .badge-tooltip{opacity:1;transform:translateX(-50%) translateY(0);}
  .badge-tooltip{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%) translateY(4px);background:#1a1a1a;border:1px solid var(--border);color:var(--text);font-size:10px;font-weight:400;letter-spacing:0;text-transform:none;padding:6px 10px;white-space:nowrap;opacity:0;pointer-events:none;transition:all 0.15s;z-index:10;}
  .badge-green{color:#22c55e;border-color:rgba(34,197,94,0.3);background:rgba(34,197,94,0.07);}
  .badge-yellow{color:#fbbf24;border-color:rgba(251,191,36,0.3);background:rgba(251,191,36,0.07);}
  .badge-orange{color:#f7931a;border-color:rgba(247,147,26,0.3);background:rgba(247,147,26,0.07);}
  .badge-red{color:#ef4444;border-color:rgba(239,68,68,0.3);background:rgba(239,68,68,0.07);}
  .badge-purple{color:#a855f7;border-color:rgba(168,85,247,0.3);background:rgba(168,85,247,0.07);}
  .badge-blue{color:#3b82f6;border-color:rgba(59,130,246,0.3);background:rgba(59,130,246,0.07);}
  .badge-cyan{color:#06b6d4;border-color:rgba(6,182,212,0.3);background:rgba(6,182,212,0.07);}
  .badge-gold{color:#fbbf24;border-color:rgba(251,191,36,0.5);background:rgba(251,191,36,0.12);box-shadow:0 0 8px rgba(251,191,36,0.15);}
  .metrics{text-align:right;min-width:90px;}
  .primary{font-size:16px;font-weight:700;color:var(--orange);line-height:1.1;}
  .primary-label{font-size:9px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
  .secondary{font-size:11px;color:var(--text-dim);margin-top:4px;}
  .secondary .live{color:var(--green)}.secondary .offline{color:var(--red)}
  .remove{position:absolute;top:6px;right:6px;background:transparent;border:none;color:var(--text-dim);cursor:pointer;font-size:14px;padding:2px 6px;opacity:0;transition:opacity 0.2s;}
  .row:hover .remove{opacity:1}.remove:hover{color:var(--red)}
  .empty{text-align:center;padding:48px 16px;color:var(--text-dim);border:1px dashed var(--border);}
  .footer{margin-top:32px;padding:20px 0;border-top:1px solid var(--border);text-align:center;font-size:10px;color:var(--text-dim);letter-spacing:1px;}
  .footer a{color:var(--orange);text-decoration:none}.footer .heart{color:var(--red)}
  .pulse{display:inline-block;width:6px;height:6px;background:var(--green);border-radius:50%;margin-right:4px;animation:pulse 2s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(34,197,94,0.6)}50%{opacity:0.5;box-shadow:0 0 0 6px rgba(34,197,94,0)}}
  @media(max-width:480px){.add-row{flex-direction:column}.input,.btn{width:100%}.input.nick{max-width:none}.row{padding:12px 10px;gap:8px}.rank{font-size:20px;min-width:36px}.primary{font-size:14px}.nick{font-size:13px}}
  .spinner{display:inline-block;width:12px;height:12px;border:2px solid var(--border);border-top-color:var(--orange);border-radius:50%;animation:spin 0.8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .hero,.stats-bar,.add-section,.filters,.board{opacity:0;animation:fadeUp 0.6s ease-out forwards;}
  .stats-bar{animation-delay:0.1s}.add-section{animation-delay:0.2s}.filters{animation-delay:0.3s}.board{animation-delay:0.4s}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="wrap">
  <header class="hero">
    <div class="logo">Solo Hunters</div>
    <div class="tagline">BITAXE <span>•</span> SOLO MINING <span>•</span> LEADERBOARD</div>
  </header>
  <div class="stats-bar">
    <div class="stat"><div class="stat-label">Hunters</div><div class="stat-value" id="stat-count">0</div></div>
    <div class="stat"><div class="stat-label">Total Hashrate</div><div class="stat-value" id="stat-hashrate">—</div></div>
    <div class="stat"><div class="stat-label">Best Difficulty</div><div class="stat-value" id="stat-best">—</div></div>
  </div>
  <section class="add-section">
    <div class="add-title">+ Hunter hinzufügen</div>
    <div class="add-row">
      <input class="input nick" id="nick-input" type="text" placeholder="Nickname" maxlength="20">
      <input class="input" id="addr-input" type="text" placeholder="bc1q... BTC address" autocomplete="off" spellcheck="false">
      <button class="btn" id="add-btn">Track</button>
    </div>
  </section>
  <div class="filters">
    <button class="filter-btn active" data-sort="best">🏆 Best Difficulty</button>
    <button class="filter-btn" data-sort="hashrate">⚡ Hashrate</button>
    <button class="filter-btn" data-sort="uptime">⏱ Uptime</button>
  </div>
  <div class="board" id="board"></div>
  <footer class="footer">
    Built with <span class="heart">♥</span> by <a href="https://x.com/__KimMinJae__" target="_blank">@__KimMinJae__</a><br>
    Data: <a href="https://web.public-pool.io" target="_blank">public-pool.io</a> • Auto-refresh 60s
  </footer>
</div>
<script>
const STORAGE_KEY = 'solo_hunters_v3';
const MY_ADDR = 'bc1qvv8t2mh2cgcrl6yxysrrrft0l5h3y8f444gknf';
const API_BASE = '/api/stats?addr=';
const REFRESH_INTERVAL = 60000;
const SEED_DATA = [{ nick:'Kim Min Jae', addr:MY_ADDR, isMe:true }];

let hunters = loadHunters();
let currentSort = 'best';
let liveData = {};

function loadHunters(){
  try{ const s=localStorage.getItem(STORAGE_KEY); if(s){const p=JSON.parse(s);if(Array.isArray(p)&&p.length)return p;} }catch(e){}
  return [...SEED_DATA];
}
function saveHunters(){ try{ localStorage.setItem(STORAGE_KEY,JSON.stringify(hunters)); }catch(e){} }

async function fetchStats(addr){
  try{
    const res = await fetch(API_BASE + addr, { cache:'no-store' });
    if(!res.ok) return { ok:false, error:`HTTP ${res.status}` };
    const data = await res.json();
    if(data && typeof data==='object') return { ok:true, data };
    return { ok:false, error:'invalid response' };
  }catch(err){ return { ok:false, error:err.message }; }
}

async function refreshAll(){
  await Promise.all(hunters.map(async h => {
    const r = await fetchStats(h.addr);
    liveData[h.addr] = { addr:h.addr, ...r };
  }));
  render();
}

// ── PARSE ─────────────────────────────────────────────────────────────
// API shape: { bestDifficulty, workersCount, workers:[{ bestDifficulty, hashRate, startTime, lastSeen }] }
function getStats(addr){
  const entry = liveData[addr];
  if(!entry) return { state:'loading' };
  if(!entry.ok) return { state:'error' };
  const d = entry.data || {};
  const workers = Array.isArray(d.workers) ? d.workers : [];
  const workerCount = num(d.workersCount ?? workers.length);

  let hashrate = 0;
  let uptimeMs = 0;
  workers.forEach(w => {
    hashrate += num(w.hashRate ?? w.hashrate ?? 0);
    if(w.startTime){
      const ms = Date.now() - new Date(w.startTime).getTime();
      if(ms > uptimeMs) uptimeMs = ms; // take longest running worker
    }
  });

  const bestDiff = num(d.bestDifficulty ?? 0);

  return {
    state: workerCount > 0 ? 'online' : 'offline',
    bestDiff,
    hashrate,
    uptimeMs,
    workerCount
  };
}

function num(v){
  if(v==null) return 0;
  if(typeof v==='number') return isNaN(v)?0:v;
  const p=parseFloat(String(v).replace(/[, ]/g,''));
  return isNaN(p)?0:p;
}

// ── UPTIME FORMAT ─────────────────────────────────────────────────────
function fmtUptime(ms){
  if(!ms) return '—';
  const s=Math.floor(ms/1000);
  const d=Math.floor(s/86400);
  const h=Math.floor((s%86400)/3600);
  const m=Math.floor((s%3600)/60);
  if(d>0) return `${d}d ${h}h`;
  if(h>0) return `${h}h ${m}m`;
  return `${m}m`;
}

function uptimeDays(ms){ return ms / 86400000; }

// ── BADGES ────────────────────────────────────────────────────────────
const BADGE_DEFS = [
  // Rarity (best diff)
  { id:'mythic',    icon:'⭐', label:'Mythic',      color:'badge-gold',   tip:'10B+ difficulty — absolute legend', check:s=>s.bestDiff>=1e10 },
  { id:'legendary', icon:'🧨', label:'Legendary',   color:'badge-red',    tip:'1B+ difficulty',                    check:s=>s.bestDiff>=1e9&&s.bestDiff<1e10 },
  { id:'epic',      icon:'🔥', label:'Epic',         color:'badge-orange', tip:'100M+ difficulty',                  check:s=>s.bestDiff>=1e8&&s.bestDiff<1e9 },
  { id:'rare',      icon:'🌟', label:'Rare',         color:'badge-yellow', tip:'10M+ difficulty',                   check:s=>s.bestDiff>=1e7&&s.bestDiff<1e8 },
  { id:'lucky',     icon:'🍀', label:'Lucky',        color:'badge-green',  tip:'1M+ difficulty',                    check:s=>s.bestDiff>=1e6&&s.bestDiff<1e7 },

  // Uptime streaks
  { id:'ut_30d',  icon:'🏔️', label:'30D Streak',   color:'badge-gold',   tip:'Online for 30+ days',               check:s=>uptimeDays(s.uptimeMs)>=30 },
  { id:'ut_7d',   icon:'🔥', label:'7D Streak',    color:'badge-orange', tip:'Online for 7+ days',                check:s=>uptimeDays(s.uptimeMs)>=7&&uptimeDays(s.uptimeMs)<30 },
  { id:'ut_24h',  icon:'⏱', label:'24H Online',   color:'badge-yellow', tip:'Online for 24+ hours',              check:s=>uptimeDays(s.uptimeMs)>=1&&uptimeDays(s.uptimeMs)<7 },

  // Hashrate
  { id:'hash_2th', icon:'⚡', label:'2 TH/s',      color:'badge-blue',   tip:'Hashrate >= 2 TH/s',                check:s=>s.hashrate>=2e12&&s.state==='online' },
  { id:'hash_1th', icon:'⚡', label:'1 TH/s Club', color:'badge-cyan',   tip:'Hashrate >= 1 TH/s',                check:s=>s.hashrate>=1e12&&s.hashrate<2e12&&s.state==='online' },

  // Difficulty milestones (all-time)
  { id:'diff_1b',   icon:'💎', label:'1B Club',    color:'badge-purple', tip:'Best difficulty ever: 1B+',          check:s=>s.bestDiff>=1e9 },
  { id:'diff_100m', icon:'🎯', label:'100M',       color:'badge-orange', tip:'Best difficulty ever: 100M+',        check:s=>s.bestDiff>=1e8&&s.bestDiff<1e9 },
  { id:'diff_10m',  icon:'🎯', label:'10M',        color:'badge-yellow', tip:'Best difficulty ever: 10M+',         check:s=>s.bestDiff>=1e7&&s.bestDiff<1e8 },
  { id:'diff_1m',   icon:'🎯', label:'1M',         color:'badge-green',  tip:'Best difficulty ever: 1M+',          check:s=>s.bestDiff>=1e6&&s.bestDiff<1e7 },

  // Status
  { id:'online',  icon:'🟢', label:'Online',       color:'badge-green',  tip:'Currently mining',                  check:s=>s.state==='online' },
  { id:'offline', icon:'🔴', label:'Offline',      color:'badge-red',    tip:'Worker offline',                    check:s=>s.state==='offline' },
];

function getBadges(s){
  if(s.state==='loading') return [];
  const earned=[];

  // Rarity - highest only
  for(const id of ['mythic','legendary','epic','rare','lucky']){
    const d=BADGE_DEFS.find(b=>b.id===id);
    if(d&&d.check(s)){earned.push(d);break;}
  }
  // Uptime - highest only
  for(const id of ['ut_30d','ut_7d','ut_24h']){
    const d=BADGE_DEFS.find(b=>b.id===id);
    if(d&&d.check(s)){earned.push(d);break;}
  }
  // Hashrate - highest only
  for(const id of ['hash_2th','hash_1th']){
    const d=BADGE_DEFS.find(b=>b.id===id);
    if(d&&d.check(s)){earned.push(d);break;}
  }
  // Diff milestone - highest only
  for(const id of ['diff_1b','diff_100m','diff_10m','diff_1m']){
    const d=BADGE_DEFS.find(b=>b.id===id);
    if(d&&d.check(s)){earned.push(d);break;}
  }
  // Status
  const st=BADGE_DEFS.find(b=>(b.id==='online'||b.id==='offline')&&b.check(s));
  if(st) earned.push(st);

  return earned;
}

function renderBadges(s){
  const badges=getBadges(s);
  if(!badges.length) return '';
  return `<div class="badges">${badges.map(b=>`<span class="badge ${b.color}">${b.icon} ${b.label}<span class="badge-tooltip">${b.tip}</span></span>`).join('')}</div>`;
}

// ── FORMAT ────────────────────────────────────────────────────────────
function fmtHash(hps){
  if(!hps) return '—';
  // public-pool returns H/s as raw number (e.g. 1184112400329)
  let v=hps,unit='H/s';
  if(v>=1e12){unit='TH/s';v=v/1e12}
  else if(v>=1e9){unit='GH/s';v=v/1e9}
  else if(v>=1e6){unit='MH/s';v=v/1e6}
  else if(v>=1e3){unit='KH/s';v=v/1e3}
  return `${v.toFixed(2)} ${unit}`;
}

function fmtDiff(d){
  if(!d) return '—';
  if(d>=1e12) return (d/1e12).toFixed(2)+' T';
  if(d>=1e9)  return (d/1e9).toFixed(2)+' B';
  if(d>=1e6)  return (d/1e6).toFixed(2)+' M';
  if(d>=1e3)  return (d/1e3).toFixed(2)+' K';
  return d.toFixed(0);
}

function shortAddr(a){ if(!a||a.length<=14)return a; return a.slice(0,8)+'…'+a.slice(-6); }
function escapeHtml(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// ── RENDER ────────────────────────────────────────────────────────────
function render(){
  const board=document.getElementById('board');
  const enriched=hunters.map(h=>({...h,stats:getStats(h.addr)}));

  enriched.sort((a,b)=>{
    const k=currentSort;
    const av=k==='hashrate'?(a.stats.hashrate||0):k==='uptime'?(a.stats.uptimeMs||0):(a.stats.bestDiff||0);
    const bv=k==='hashrate'?(b.stats.hashrate||0):k==='uptime'?(b.stats.uptimeMs||0):(b.stats.bestDiff||0);
    return bv-av;
  });

  document.getElementById('stat-count').textContent=enriched.length;
  const totalHash=enriched.reduce((s,h)=>s+(h.stats.hashrate||0),0);
  document.getElementById('stat-hashrate').textContent=fmtHash(totalHash);
  const topBest=enriched.reduce((m,h)=>Math.max(m,h.stats.bestDiff||0),0);
  document.getElementById('stat-best').textContent=fmtDiff(topBest);

  if(!enriched.length){
    board.innerHTML=`<div class="empty"><div style="font-size:32px;margin-bottom:8px;opacity:0.5">⛏️</div><div>Noch keine Hunter.<br>Trag oben eine BTC-Adresse ein.</div></div>`;
    return;
  }

  board.innerHTML=enriched.map((h,i)=>{
    const s=h.stats;
    const meCls=h.isMe?' me':'';
    const stateCls=s.state==='loading'?' loading':s.state==='error'?' error':'';
    let pv,pl,sec;

    if(s.state==='loading'){pv='<span class="spinner"></span>';pl='loading';sec='';}
    else if(s.state==='error'){pv='—';pl='error';sec='<span class="offline">nicht gefunden</span>';}
    else if(currentSort==='hashrate'){
      pv=fmtHash(s.hashrate);pl='hashrate';
      sec=`Best: ${fmtDiff(s.bestDiff)} · Up: ${fmtUptime(s.uptimeMs)}`;
    } else if(currentSort==='uptime'){
      pv=fmtUptime(s.uptimeMs);pl='uptime';
      sec=s.state==='online'?`<span class="live"><span class="pulse"></span>${fmtHash(s.hashrate)}</span>`:`<span class="offline">offline</span>`;
    } else {
      pv=fmtDiff(s.bestDiff);pl='all-time best';
      sec=s.state==='online'
        ?`<span class="live"><span class="pulse"></span>${fmtHash(s.hashrate)} · ${fmtUptime(s.uptimeMs)}</span>`
        :`<span class="offline">offline</span>`;
    }

    return `<div class="row${meCls}${stateCls}">
      <div class="rank">${i+1}</div>
      <div class="info">
        <div class="nick-row">
          <span class="nick">${escapeHtml(h.nick||'Anonymous')}</span>
          ${h.isMe?'<span class="me-badge">YOU</span>':''}
        </div>
        <div class="addr" title="${escapeHtml(h.addr)}">${shortAddr(h.addr)}</div>
        ${renderBadges(s)}
      </div>
      <div class="metrics">
        <div class="primary">${pv}</div>
        <div class="primary-label">${pl}</div>
        ${sec?`<div class="secondary">${sec}</div>`:''}
      </div>
      ${h.isMe?'':`<button class="remove" data-addr="${escapeHtml(h.addr)}" title="Entfernen">✕</button>`}
    </div>`;
  }).join('');

  document.querySelectorAll('.remove').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const a=btn.getAttribute('data-addr');
      hunters=hunters.filter(h=>h.addr!==a);
      saveHunters();
      delete liveData[a];
      render();
    });
  });
}

// ── ADD ───────────────────────────────────────────────────────────────
function addHunter(){
  const nickEl=document.getElementById('nick-input');
  const addrEl=document.getElementById('addr-input');
  const nick=nickEl.value.trim()||'Anonymous';
  const addr=addrEl.value.trim();
  if(!addr){addrEl.focus();return;}
  if(!/^(bc1|[13])[a-zA-HJ-NP-Z0-9]{20,}$/.test(addr)){alert('Keine gültige BTC-Adresse.');return;}
  if(hunters.find(h=>h.addr===addr)){alert('Schon eingetragen.');return;}
  hunters.push({nick,addr});
  saveHunters();
  nickEl.value='';addrEl.value='';
  render();
  fetchStats(addr).then(r=>{liveData[addr]={addr,...r};render();});
}

document.getElementById('add-btn').addEventListener('click',addHunter);
document.getElementById('addr-input').addEventListener('keydown',e=>{if(e.key==='Enter')addHunter();});
document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentSort=btn.getAttribute('data-sort');
    render();
  });
});

render();
refreshAll();
setInterval(refreshAll,REFRESH_INTERVAL);
</script>
</body>
</html>
