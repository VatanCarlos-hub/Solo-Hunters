<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SOLO HUNTERS — Bitaxe Leaderboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=JetBrains+Mono:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a0a;
    --bg-card:#121212;
    --bg-card-hi:#1a1a1a;
    --orange:#f7931a;
    --orange-dim:#a05f0d;
    --red:#ef4444;
    --green:#22c55e;
    --text:#e5e5e5;
    --text-dim:#737373;
    --border:#262626;
    --gold:#fbbf24;
    --silver:#cbd5e1;
    --bronze:#b45309;
  }

  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;min-height:100vh}

  body{
    background-image:
      radial-gradient(circle at 20% 10%, rgba(247,147,26,0.08), transparent 40%),
      radial-gradient(circle at 80% 60%, rgba(247,147,26,0.05), transparent 50%),
      linear-gradient(180deg, #0a0a0a 0%, #050505 100%);
    background-attachment:fixed;
    padding-bottom:120px;
  }

  body::before{
    content:'';
    position:fixed;inset:0;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.4'/%3E%3C/svg%3E");
    opacity:0.04;
    pointer-events:none;
    z-index:1;
  }

  .wrap{max-width:720px;margin:0 auto;padding:24px 16px;position:relative;z-index:2}

  /* HEADER */
  .hero{text-align:center;padding:32px 0 24px;border-bottom:1px solid var(--border);margin-bottom:24px;}
  .logo{font-family:'UnifrakturMaguntia',serif;font-size:clamp(40px, 11vw, 64px);line-height:0.9;color:var(--orange);letter-spacing:2px;text-shadow:0 0 30px rgba(247,147,26,0.4);margin-bottom:8px;transform:translateX(2px);}
  .tagline{font-size:11px;text-transform:uppercase;letter-spacing:4px;color:var(--text-dim);font-weight:500;}
  .tagline span{color:var(--orange)}

  /* STATS BAR */
  .stats-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border:1px solid var(--border);margin-bottom:20px;}
  .stat{background:var(--bg-card);padding:12px 8px;text-align:center;}
  .stat-label{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-dim);margin-bottom:4px;}
  .stat-value{font-size:18px;font-weight:700;color:var(--orange);}

  /* ADD SECTION */
  .add-section{background:var(--bg-card);border:1px solid var(--border);padding:16px;margin-bottom:20px;position:relative;}
  .add-section::before{content:'';position:absolute;top:-1px;left:-1px;width:30px;height:30px;border-top:2px solid var(--orange);border-left:2px solid var(--orange);}
  .add-section::after{content:'';position:absolute;bottom:-1px;right:-1px;width:30px;height:30px;border-bottom:2px solid var(--orange);border-right:2px solid var(--orange);}
  .add-title{font-size:11px;text-transform:uppercase;letter-spacing:3px;color:var(--orange);margin-bottom:12px;font-weight:700;}
  .add-row{display:flex;gap:8px;flex-wrap:wrap}
  .input{flex:1;min-width:200px;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:12px;font-family:'JetBrains Mono',monospace;font-size:13px;outline:none;transition:border-color 0.2s;}
  .input:focus{border-color:var(--orange)}
  .input.nick{max-width:160px}
  .btn{background:var(--orange);color:#000;border:none;padding:12px 20px;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:2px;cursor:pointer;transition:all 0.2s;}
  .btn:hover{background:#fff;transform:translateY(-1px)}
  .btn:disabled{opacity:0.4;cursor:not-allowed;transform:none}

  /* FILTERS */
  .filters{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px;}
  .filter-btn{background:transparent;border:1px solid var(--border);color:var(--text-dim);padding:8px 14px;font-family:'JetBrains Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:1.5px;cursor:pointer;white-space:nowrap;transition:all 0.2s;}
  .filter-btn:hover{color:var(--text);border-color:var(--text-dim)}
  .filter-btn.active{background:var(--orange);color:#000;border-color:var(--orange);font-weight:700;}

  /* LEADERBOARD */
  .board{display:flex;flex-direction:column;gap:8px;}

  .row{background:var(--bg-card);border:1px solid var(--border);padding:14px;display:grid;grid-template-columns:auto 1fr auto;align-items:start;gap:12px;position:relative;transition:all 0.2s;}
  .row:hover{border-color:var(--orange-dim);background:var(--bg-card-hi)}
  .row.me{border-color:var(--orange);background:linear-gradient(90deg, rgba(247,147,26,0.08), transparent);}
  .row.loading{opacity:0.5}
  .row.error{opacity:0.6;border-color:var(--red)}

  .rank{font-size:24px;font-weight:800;color:var(--text-dim);min-width:48px;text-align:center;font-variant-numeric:tabular-nums;padding-top:2px;}
  .row:nth-child(1) .rank{color:var(--gold);text-shadow:0 0 10px rgba(251,191,36,0.3)}
  .row:nth-child(2) .rank{color:var(--silver)}
  .row:nth-child(3) .rank{color:var(--bronze)}

  .info{min-width:0}
  .nick-row{display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap;}
  .nick{font-weight:700;font-size:15px;color:var(--text);letter-spacing:0.5px;}
  .me-badge{background:var(--orange);color:#000;font-size:9px;padding:2px 6px;font-weight:800;letter-spacing:1px;}
  .addr{font-size:11px;color:var(--text-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

  /* BADGES */
  .badges{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;}
  .badge{
    display:inline-flex;
    align-items:center;
    gap:3px;
    padding:2px 7px;
    font-size:9px;
    font-weight:700;
    letter-spacing:0.8px;
    text-transform:uppercase;
    border:1px solid;
    line-height:1.6;
    cursor:default;
    position:relative;
  }
  .badge:hover .badge-tooltip{opacity:1;pointer-events:auto;transform:translateY(0);}
  .badge-tooltip{
    position:absolute;
    bottom:calc(100% + 6px);
    left:50%;
    transform:translateX(-50%) translateY(4px);
    background:#1a1a1a;
    border:1px solid var(--border);
    color:var(--text);
    font-size:10px;
    font-weight:400;
    letter-spacing:0;
    text-transform:none;
    padding:6px 10px;
    white-space:nowrap;
    opacity:0;
    pointer-events:none;
    transition:all 0.15s;
    z-index:10;
  }

  /* Badge color variants */
  .badge-green{color:#22c55e;border-color:rgba(34,197,94,0.3);background:rgba(34,197,94,0.07);}
  .badge-yellow{color:#fbbf24;border-color:rgba(251,191,36,0.3);background:rgba(251,191,36,0.07);}
  .badge-orange{color:#f7931a;border-color:rgba(247,147,26,0.3);background:rgba(247,147,26,0.07);}
  .badge-red{color:#ef4444;border-color:rgba(239,68,68,0.3);background:rgba(239,68,68,0.07);}
  .badge-purple{color:#a855f7;border-color:rgba(168,85,247,0.3);background:rgba(168,85,247,0.07);}
  .badge-blue{color:#3b82f6;border-color:rgba(59,130,246,0.3);background:rgba(59,130,246,0.07);}
  .badge-cyan{color:#06b6d4;border-color:rgba(6,182,212,0.3);background:rgba(6,182,212,0.07);}
  .badge-gold{color:#fbbf24;border-color:rgba(251,191,36,0.5);background:rgba(251,191,36,0.12);box-shadow:0 0 8px rgba(251,191,36,0.15);}

  /* METRICS */
  .metrics{text-align:right;min-width:90px;}
  .primary{font-size:16px;font-weight:700;color:var(--orange);line-height:1.1;font-variant-numeric:tabular-nums;}
  .primary-label{font-size:9px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
  .secondary{font-size:11px;color:var(--text-dim);margin-top:4px;}
  .secondary .live{color:var(--green)}
  .secondary .offline{color:var(--red)}

  .remove{position:absolute;top:6px;right:6px;background:transparent;border:none;color:var(--text-dim);cursor:pointer;font-size:14px;padding:2px 6px;opacity:0;transition:opacity 0.2s;}
  .row:hover .remove{opacity:1}
  .remove:hover{color:var(--red)}

  .empty{text-align:center;padding:48px 16px;color:var(--text-dim);border:1px dashed var(--border);}
  .empty-icon{font-size:32px;margin-bottom:8px;opacity:0.5}

  /* FOOTER */
  .footer{margin-top:32px;padding:20px 0;border-top:1px solid var(--border);text-align:center;font-size:10px;color:var(--text-dim);letter-spacing:1px;}
  .footer a{color:var(--orange);text-decoration:none}
  .footer .heart{color:var(--red)}

  /* PULSE */
  .pulse{display:inline-block;width:6px;height:6px;background:var(--green);border-radius:50%;margin-right:4px;animation:pulse 2s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(34,197,94,0.6)}50%{opacity:0.5;box-shadow:0 0 0 6px rgba(34,197,94,0)}}

  /* DEBUG PANEL */
  .debug-panel{background:#0d0d0d;border:1px solid #1e1e1e;padding:10px 14px;margin-bottom:12px;font-size:10px;color:#555;display:none;}
  .debug-panel.show{display:block;}

  @media (max-width:480px){
    .add-row{flex-direction:column}
    .input,.btn{width:100%}
    .input.nick{max-width:none}
    .row{padding:12px 10px;gap:8px}
    .rank{font-size:20px;min-width:36px}
    .primary{font-size:14px}
    .nick{font-size:13px}
    .addr{font-size:10px}
  }

  .spinner{display:inline-block;width:12px;height:12px;border:2px solid var(--border);border-top-color:var(--orange);border-radius:50%;animation:spin 0.8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}

  .hero,.stats-bar,.add-section,.filters,.board{opacity:0;animation:fadeUp 0.6s ease-out forwards;}
  .stats-bar{animation-delay:0.1s}.add-section{animation-delay:0.2s}.filters{animation-delay:0.3s}.board{animation-delay:0.4s}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="wrap">

  <header class="hero">
    <div class="logo">Solo Hunters</div>
    <div class="tagline">BITAXE <span>•</span> SOLO MINING <span>•</span> LEADERBOARD</div>
  </header>

  <div class="stats-bar">
    <div class="stat"><div class="stat-label">Hunters</div><div class="stat-value" id="stat-count">0</div></div>
    <div class="stat"><div class="stat-label">Total Hashrate</div><div class="stat-value" id="stat-hashrate">0 TH/s</div></div>
    <div class="stat"><div class="stat-label">Best Difficulty</div><div class="stat-value" id="stat-best">0</div></div>
  </div>

  <section class="add-section">
    <div class="add-title">+ Hunter hinzufügen</div>
    <div class="add-row">
      <input class="input nick" id="nick-input" type="text" placeholder="Nickname" maxlength="20">
      <input class="input" id="addr-input" type="text" placeholder="bc1q... BTC address" autocomplete="off" spellcheck="false">
      <button class="btn" id="add-btn">Track</button>
    </div>
  </section>

  <div id="debug-panel" class="debug-panel"></div>

  <div class="filters">
    <button class="filter-btn active" data-sort="best">🏆 Best Difficulty</button>
    <button class="filter-btn" data-sort="hashrate">⚡ Hashrate</button>
    <button class="filter-btn" data-sort="boot">🔥 Since Boot</button>
    <button class="filter-btn" data-sort="shares">📊 Shares</button>
  </div>

  <div class="board" id="board"></div>

  <footer class="footer">
    Built with <span class="heart">♥</span> by <a href="https://x.com/__KimMinJae__" target="_blank">@__KimMinJae__</a><br>
    Data: <a href="https://web.public-pool.io" target="_blank">public-pool.io</a> • Auto-refresh 60s
  </footer>

</div>

<script>
const STORAGE_KEY = 'solo_hunters_v2';
const MY_ADDR = 'bc1qvv8t2mh2cgcrl6yxysrrrft0l5h3y8f444gknf';
const API_ENDPOINTS = ['/api/stats?addr='];
const REFRESH_INTERVAL = 60000;

const SEED_DATA = [
  { nick: 'Kim Min Jae', addr: MY_ADDR, isMe: true }
];

let hunters = loadHunters();
let currentSort = 'best';
let liveData = {};

// ── STORAGE ──────────────────────────────────────────────────────────
function loadHunters(){
  try{
    const saved = localStorage.getItem(STORAGE_KEY);
    if(saved){ const p = JSON.parse(saved); if(Array.isArray(p) && p.length) return p; }
  }catch(e){}
  return [...SEED_DATA];
}
function saveHunters(){ try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(hunters)); }catch(e){} }

// ── API ───────────────────────────────────────────────────────────────
async function fetchStats(addr){
  let lastErr = null;
  for(const base of API_ENDPOINTS){
    try{
      const res = await fetch(base + addr, { cache:'no-store' });
      if(!res.ok){ lastErr = `HTTP ${res.status}`; continue; }
      const data = await res.json();
      if(data && typeof data === 'object') return { ok:true, data };
      lastErr = 'invalid response';
    }catch(err){ lastErr = err.message; }
  }
  return { ok:false, error: lastErr || 'all endpoints failed' };
}

async function refreshAll(){
  const results = await Promise.all(
    hunters.map(async h => {
      const r = await fetchStats(h.addr);
      return { addr:h.addr, ...r };
    })
  );
  results.forEach(r => { liveData[r.addr] = r; });
  render();
}

// ── PARSE STATS ───────────────────────────────────────────────────────
function getStats(addr){
  const entry = liveData[addr];
  if(!entry) return { state:'loading' };
  if(!entry.ok) return { state:'error' };

  const d = entry.data || {};

  // ── SHARES FIX ──
  // public-pool returns shares at multiple levels; check all of them
  const workers = Array.isArray(d.workers) ? d.workers : [];
  const workerCount = d.workersCount ?? workers.length ?? 0;

  let hashrate = 0;
  let shares = 0;

  workers.forEach(w => {
    hashrate += num(w.hashRate ?? w.hashrate ?? w.currentHashrate ?? 0);
    // Each worker: try every known field name
    shares += num(
      w.sharesAccepted ?? w.shares ?? w.validShares ??
      w.acceptedShares ?? w.totalShares ?? w.submitted ?? 0
    );
  });

  // Top-level fallback (public-pool sometimes puts it here)
  if(shares === 0){
    shares = num(
      d.sharesAccepted ?? d.shares ?? d.totalShares ??
      d.acceptedShares ?? d.validShares ?? d.submitted ?? 0
    );
  }

  // If still 0 and workers exist, sum worker-level difficulty sums as proxy
  // (some pool versions report sharesDifficulty instead)
  if(shares === 0 && workers.length){
    workers.forEach(w => {
      shares += num(w.sharesDifficulty ?? w.difficultyAccepted ?? 0);
    });
  }

  const bestDiff      = num(d.bestDifficulty ?? d.best_difficulty ?? 0);
  const bestSinceBoot = num(d.bestDifficultySinceReset ?? d.bestSinceBoot ?? 0);

  // Debug dump (visible when panel is shown)
  logDebug(addr, { bestDiff, bestSinceBoot, hashrate, shares, workerCount, raw_top_keys: Object.keys(d), raw_worker_keys: workers[0] ? Object.keys(workers[0]) : [] });

  return {
    state: workerCount > 0 ? 'online' : 'offline',
    bestDiff, bestSinceBoot, hashrate, workerCount, shares
  };
}

function num(v){
  if(v == null) return 0;
  if(typeof v === 'number') return isNaN(v) ? 0 : v;
  const p = parseFloat(String(v).replace(/[, ]/g,''));
  return isNaN(p) ? 0 : p;
}

// ── DEBUG ─────────────────────────────────────────────────────────────
const debugLog = {};
function logDebug(addr, info){ debugLog[addr] = info; }
// Uncomment next line to show debug panel:
// document.addEventListener('DOMContentLoaded', () => document.getElementById('debug-panel').classList.add('show'));

// ── BADGES ────────────────────────────────────────────────────────────
const BADGE_DEFS = [
  // Difficulty milestones
  { id:'diff_1m',   icon:'🎯', label:'1M Hunter',      color:'badge-green',  tip:'Reached 1M difficulty',         check: s => s.bestDiff >= 1e6 },
  { id:'diff_10m',  icon:'🎯', label:'10M Hunter',     color:'badge-yellow', tip:'Reached 10M difficulty',        check: s => s.bestDiff >= 1e7 },
  { id:'diff_100m', icon:'🎯', label:'100M Hunter',    color:'badge-orange', tip:'Reached 100M difficulty',       check: s => s.bestDiff >= 1e8 },
  { id:'diff_1b',   icon:'💎', label:'1B Club',        color:'badge-purple', tip:'Reached 1B difficulty — elite', check: s => s.bestDiff >= 1e9 },
  { id:'diff_10b',  icon:'👑', label:'10B Legend',     color:'badge-gold',   tip:'10B difficulty. Absolute unit.', check: s => s.bestDiff >= 1e10 },

  // Hashrate milestones
  { id:'hash_1th',  icon:'⚡', label:'1 TH/s Club',   color:'badge-cyan',   tip:'Hashrate >= 1 TH/s',            check: s => s.hashrate >= 1 && s.state==='online' },
  { id:'hash_2th',  icon:'⚡', label:'2 TH/s Beast',  color:'badge-blue',   tip:'Hashrate >= 2 TH/s',            check: s => s.hashrate >= 2 && s.state==='online' },

  // Shares milestones
  { id:'shares_1k', icon:'📊', label:'1K Shares',     color:'badge-green',  tip:'Submitted 1,000 shares',        check: s => s.shares >= 1000 },
  { id:'shares_10k',icon:'📊', label:'10K Shares',    color:'badge-yellow', tip:'Submitted 10,000 shares',       check: s => s.shares >= 10000 },
  { id:'shares_100k',icon:'📊',label:'100K Shares',   color:'badge-orange', tip:'Submitted 100,000 shares',      check: s => s.shares >= 100000 },
  { id:'shares_1m', icon:'📊', label:'1M Shares',     color:'badge-red',    tip:'1 Million shares — insane uptime', check: s => s.shares >= 1000000 },

  // Status
  { id:'online',    icon:'🟢', label:'Online',         color:'badge-green',  tip:'Currently mining',              check: s => s.state === 'online' },
  { id:'offline',   icon:'🔴', label:'Offline',        color:'badge-red',    tip:'Worker not found / offline',    check: s => s.state === 'offline' },

  // Rarity from bestDiff (Luck Score)
  { id:'lucky',     icon:'🍀', label:'Lucky',          color:'badge-green',  tip:'Best diff qualifies as Lucky',  check: s => s.bestDiff >= 1e5 && s.bestDiff < 1e7 },
  { id:'rare',      icon:'🌟', label:'Rare',           color:'badge-yellow', tip:'Rare difficulty achieved',      check: s => s.bestDiff >= 1e7 && s.bestDiff < 1e8 },
  { id:'epic',      icon:'🔥', label:'Epic',           color:'badge-orange', tip:'Epic difficulty achieved',      check: s => s.bestDiff >= 1e8 && s.bestDiff < 1e9 },
  { id:'legendary', icon:'🧨', label:'Legendary',      color:'badge-red',    tip:'Legendary — top tier miner',   check: s => s.bestDiff >= 1e9 && s.bestDiff < 1e10 },
  { id:'mythic',    icon:'⭐', label:'Mythic',         color:'badge-gold',   tip:'MYTHIC — basically a god',      check: s => s.bestDiff >= 1e10 },
];

// Priority order: rarity badges first (only highest), then milestone badges
function getBadges(stats){
  if(stats.state === 'loading') return [];

  const earned = [];

  // Rarity - show only highest tier
  const rarityOrder = ['mythic','legendary','epic','rare','lucky'];
  for(const rid of rarityOrder){
    const def = BADGE_DEFS.find(b => b.id === rid);
    if(def && def.check(stats)){ earned.push(def); break; }
  }

  // Status badge (online/offline)
  const statusDef = BADGE_DEFS.find(b => (b.id === 'online' || b.id === 'offline') && b.check(stats));
  if(statusDef) earned.push(statusDef);

  // Hashrate - highest only
  const hrOrder = ['hash_2th','hash_1th'];
  for(const hid of hrOrder){
    const def = BADGE_DEFS.find(b => b.id === hid);
    if(def && def.check(stats)){ earned.push(def); break; }
  }

  // Difficulty milestones - highest only
  const diffOrder = ['diff_10b','diff_1b','diff_100m','diff_10m','diff_1m'];
  for(const did of diffOrder){
    const def = BADGE_DEFS.find(b => b.id === did);
    if(def && def.check(stats)){ earned.push(def); break; }
  }

  // Shares - highest only
  const sharesOrder = ['shares_1m','shares_100k','shares_10k','shares_1k'];
  for(const sid of sharesOrder){
    const def = BADGE_DEFS.find(b => b.id === sid);
    if(def && def.check(stats)){ earned.push(def); break; }
  }

  return earned;
}

function renderBadges(stats){
  const badges = getBadges(stats);
  if(!badges.length) return '';
  return `<div class="badges">${badges.map(b => `
    <span class="badge ${b.color}">
      ${b.icon} ${b.label}
      <span class="badge-tooltip">${b.tip}</span>
    </span>`).join('')}</div>`;
}

// ── FORMAT ────────────────────────────────────────────────────────────
function fmtHash(hps){
  if(!hps) return '—';
  let v = hps, unit = 'H/s';
  // public-pool reports in GH/s (small numbers like 1.16)
  if(v > 0 && v < 1000){
    if(v >= 1000) return `${(v/1000).toFixed(2)} TH/s`;
    return `${v.toFixed(2)} GH/s`;
  }
  if(v >= 1e12){ unit='TH/s'; v=v/1e12 }
  else if(v >= 1e9){ unit='GH/s'; v=v/1e9 }
  else if(v >= 1e6){ unit='MH/s'; v=v/1e6 }
  else if(v >= 1e3){ unit='KH/s'; v=v/1e3 }
  return `${v.toFixed(2)} ${unit}`;
}

function fmtDiff(d){
  if(!d) return '—';
  if(d >= 1e12) return (d/1e12).toFixed(2) + ' T';
  if(d >= 1e9)  return (d/1e9).toFixed(2)  + ' B';
  if(d >= 1e6)  return (d/1e6).toFixed(2)  + ' M';
  if(d >= 1e3)  return (d/1e3).toFixed(2)  + ' K';
  return d.toFixed(0);
}

function fmtNum(n){
  if(!n) return '0';
  if(n >= 1e6) return (n/1e6).toFixed(2) + 'M';
  if(n >= 1e3) return (n/1e3).toFixed(1) + 'K';
  return Math.round(n).toLocaleString();
}

function shortAddr(a){
  if(!a || a.length <= 14) return a;
  return a.slice(0,8) + '…' + a.slice(-6);
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ── RENDER ────────────────────────────────────────────────────────────
function render(){
  const board = document.getElementById('board');
  const enriched = hunters.map(h => ({ ...h, stats: getStats(h.addr) }));

  enriched.sort((a,b)=>{
    const key = currentSort;
    const av = key==='hashrate'?(a.stats.hashrate||0):key==='boot'?(a.stats.bestSinceBoot||0):key==='shares'?(a.stats.shares||0):(a.stats.bestDiff||0);
    const bv = key==='hashrate'?(b.stats.hashrate||0):key==='boot'?(b.stats.bestSinceBoot||0):key==='shares'?(b.stats.shares||0):(b.stats.bestDiff||0);
    return bv - av;
  });

  document.getElementById('stat-count').textContent = enriched.length;
  const totalHash = enriched.reduce((s,h)=>s+(h.stats.hashrate||0),0);
  document.getElementById('stat-hashrate').textContent = fmtHash(totalHash);
  const topBest = enriched.reduce((m,h)=>Math.max(m,h.stats.bestDiff||0),0);
  document.getElementById('stat-best').textContent = fmtDiff(topBest);

  if(!enriched.length){
    board.innerHTML = `<div class="empty"><div class="empty-icon">⛏️</div><div>Noch keine Hunter.<br>Trag oben eine BTC-Adresse ein.</div></div>`;
    return;
  }

  board.innerHTML = enriched.map((h, i) => {
    const s = h.stats;
    const meCls = h.isMe ? ' me' : '';
    const stateCls = s.state==='loading'?' loading':s.state==='error'?' error':'';

    let primaryVal, primaryLabel, secondary;
    if(s.state==='loading'){
      primaryVal='<span class="spinner"></span>'; primaryLabel='lädt'; secondary='';
    } else if(s.state==='error'){
      primaryVal='—'; primaryLabel='error'; secondary='<span class="offline">nicht gefunden</span>';
    } else {
      if(currentSort==='hashrate'){
        primaryVal=fmtHash(s.hashrate); primaryLabel='hashrate';
        secondary=`Best: ${fmtDiff(s.bestDiff)} · ${fmtNum(s.shares)} shares`;
      } else if(currentSort==='boot'){
        primaryVal=fmtDiff(s.bestSinceBoot); primaryLabel='since boot';
        secondary=`All-time: ${fmtDiff(s.bestDiff)} · ${fmtNum(s.shares)} shares`;
      } else if(currentSort==='shares'){
        primaryVal=fmtNum(s.shares); primaryLabel='shares';
        secondary=s.state==='online'
          ?`<span class="live"><span class="pulse"></span>${fmtHash(s.hashrate)}</span>`
          :`Best: ${fmtDiff(s.bestDiff)}`;
      } else {
        primaryVal=fmtDiff(s.bestDiff); primaryLabel='all-time best';
        secondary=s.state==='online'
          ?`<span class="live"><span class="pulse"></span>${fmtHash(s.hashrate)} · ${fmtNum(s.shares)} shares</span>`
          :`<span class="offline">offline</span>`;
      }
    }

    return `
      <div class="row${meCls}${stateCls}">
        <div class="rank">${i+1}</div>
        <div class="info">
          <div class="nick-row">
            <span class="nick">${escapeHtml(h.nick||'Anonymous')}</span>
            ${h.isMe?'<span class="me-badge">YOU</span>':''}
          </div>
          <div class="addr" title="${escapeHtml(h.addr)}">${shortAddr(h.addr)}</div>
          ${renderBadges(s)}
        </div>
        <div class="metrics">
          <div class="primary">${primaryVal}</div>
          <div class="primary-label">${primaryLabel}</div>
          ${secondary?`<div class="secondary">${secondary}</div>`:''}
        </div>
        ${h.isMe?'':`<button class="remove" data-addr="${escapeHtml(h.addr)}" title="Entfernen">✕</button>`}
      </div>`;
  }).join('');

  document.querySelectorAll('.remove').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const a = btn.getAttribute('data-addr');
      hunters = hunters.filter(h=>h.addr!==a);
      saveHunters();
      delete liveData[a];
      render();
    });
  });
}

// ── ADD ───────────────────────────────────────────────────────────────
function addHunter(){
  const nickEl = document.getElementById('nick-input');
  const addrEl = document.getElementById('addr-input');
  const nick = nickEl.value.trim() || 'Anonymous';
  const addr = addrEl.value.trim();
  if(!addr){ addrEl.focus(); return; }
  if(!/^(bc1|[13])[a-zA-HJ-NP-Z0-9]{20,}$/.test(addr)){ alert('Keine gültige BTC-Adresse.'); return; }
  if(hunters.find(h=>h.addr===addr)){ alert('Schon eingetragen.'); return; }
  hunters.push({ nick, addr });
  saveHunters();
  nickEl.value=''; addrEl.value='';
  render();
  fetchStats(addr).then(r=>{ liveData[addr]={ addr, ...r }; render(); });
}

// ── WIRE UP ───────────────────────────────────────────────────────────
document.getElementById('add-btn').addEventListener('click', addHunter);
document.getElementById('addr-input').addEventListener('keydown', e=>{ if(e.key==='Enter') addHunter(); });
document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentSort = btn.getAttribute('data-sort');
    render();
  });
});

render();
refreshAll();
setInterval(refreshAll, REFRESH_INTERVAL);
</script>
</body>
</html>
